# 示例配置：复制本文件为同级目录下的 application.yml（该文件已被 .gitignore 忽略，仅保留在你本机）。
#
# 【COS 密钥】不要写真实 Secret 到会被 git push 的文件。任选其一：
#   1) 系统环境变量：TENCENT_COS_SECRET_ID、TENCENT_COS_SECRET_KEY（推荐）
#   2) 本机 application-local.yml（已加入 .gitignore，勿提交）
#
# 【若密钥曾被 push 或被 GitHub Secret scanning 拦截】请到腾讯云「访问管理」轮换密钥，作废旧 Key。
#
# @author <a href="https://github.com/luochen">程序员啊琛</a>

spring:
  application:
    name: chenoj-backend
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  session:
    store-type: redis
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chenoj
    username: root
    password: YOUR_DB_PASSWORD
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
  # Elasticsearch（可选）
  # todo 按需取消注释并修改
#  elasticsearch:
#    uris: http://localhost:9200
#    username: root
#    password: YOUR_ES_PASSWORD
  servlet:
    multipart:
      max-file-size: 10MB

server:
  address: 0.0.0.0
  port: 8121
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

# 微信相关（占位符示例，请勿提交真实值）
wx:
  mp:
    token: xxx
    aesKey: xxx
    appId: xxx
    secret: xxx
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: 127.0.0.1
        port: 6379
      type: Memory
  open:
    appId: xxx
    appSecret: xxx

cos:
  client:
    accessKey: ${TENCENT_COS_SECRET_ID:}
    secretKey: ${TENCENT_COS_SECRET_KEY:}
    region: your-region
    bucket: your-bucket-name

knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.luochen.chenoj.controller

codesandbox:
  type: remote
  remote:
    url: http://127.0.0.1:8090/executeCode
