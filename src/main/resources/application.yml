# 公共配置文件
# @author <a href="https://github.com/luochen">程序员啊琛</a>
# @from <a href="https://chenduoduo.icu">琛多多的oj网站</a>
spring:
  application:
    name: chenoj-backend
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    # 须先配置 Redis
    store-type: redis
    # 30 天过期
    timeout: 2592000
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chenoj
    username: root
    password: 123456
  # Redis 配置
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
#    password: 123456
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 8121
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# 微信相关
# 对象存储（密钥勿提交仓库：在环境变量或 IDE 运行配置中设置）
cos:
  client:
    accessKey: ${TENCENT_COS_SECRET_ID:}
    secretKey: ${TENCENT_COS_SECRET_KEY:}
    region: ap-guangzhou
    bucket: chenduoduo-1356118125
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.luochen.chenoj.controller
# 代码沙箱配置
codesandbox:
  type: remote
  remote:
    # 判题服务完整地址（与沙箱项目接口路径一致，一般为 /executeCode）
    url: http://172.24.180.222:8090/executeCode